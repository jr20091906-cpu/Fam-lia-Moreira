<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Rotina - Família Moreira</title>

<link rel="stylesheet" href="nova-rotina.css">

</head>

<body>

<div class="container">

<header>

<h1>🏠 Nova Rotina</h1>

<p>Cadastre uma atividade recorrente da casa.</p>

</header>

<form id="formRotina">

<label>Título</label>
<input
type="text"
id="titulo"
required>

<label>Responsável</label>

<select id="responsavel" required>

<option value="laercio">👑 Laércio</option>
<option value="taina">🌸 Tainá</option>
<option value="anaclara">💜 Ana Clara</option>
<option value="isadora">💚 Isadora</option>
<option value="isaac">🧸 Isaac</option>
<option value="todos">👨‍👩‍👧‍👦 Toda a família</option>

</select>

<label>Frequência</label>

<select id="frequencia">

<option value="Diária">Diária</option>
<option value="Semanal">Semanal</option>
<option value="Quinzenal">Quinzenal</option>
<option value="Mensal">Mensal</option>

</select>

<label>Observações</label>

<textarea
id="observacoes"
rows="4"
placeholder="Opcional"></textarea>

<button type="submit">

💾 Salvar Rotina

</button>

</form>

<a href="rotina.html">

← Voltar

</a>

</div>

<script src="nova-rotina.js"></script>

</body>

</html>
