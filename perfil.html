<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil - Família Moreira</title>

<link rel="stylesheet" href="perfil.css">

</head>


<body>


<div class="perfil-container">


<header>

<h1>❤️ Família Moreira</h1>

<p>Perfil do membro</p>

</header>



<div class="perfil-card">


<div class="foto-perfil">

📷

</div>


<h2 id="nomeMembro">
Nome
</h2>


<p id="tipoMembro">
Perfil
</p>



<div class="informacoes">


<p>🎂 Data de nascimento</p>

<p>📝 Informações pessoais</p>

<p>🔐 Permissões</p>


</div>


</div>



<a href="familia.html" class="voltar">

← Voltar

</a>


</div>



<script>


const membros = {

    laercio:{
        nome:"Laércio",
        perfil:"Administrador 👑"
    },

    taina:{
        nome:"Tainá",
        perfil:"Responsável"
    },

    anaclara:{
        nome:"Ana Clara",
        perfil:"Filha"
    },

    isadora:{
        nome:"Isadora",
        perfil:"Filha"
    },

    isaac:{
        nome:"Isaac",
        perfil:"Filho"
    }

};



const parametros = new URLSearchParams(window.location.search);


const membro = parametros.get("membro");



if(membro && membros[membro]){


document.getElementById("nomeMembro").innerHTML =
membros[membro].nome;



document.getElementById("tipoMembro").innerHTML =
membros[membro].perfil;


}



</script>


</body>

</html>
