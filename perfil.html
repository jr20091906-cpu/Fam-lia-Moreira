<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil - Família Moreira</title>

<link rel="stylesheet" href="perfil.css">

</head>


<body>


<div class="perfil-container">


<header>

<h1>❤️ Família Moreira</h1>

<p>Perfil do membro</p>

</header>



<div class="perfil-card">


<div class="foto-perfil">

<img id="fotoMembro" src="" alt="Foto do membro">

</div>


<h2 id="nomeMembro">Nome</h2>


<p id="tipoMembro">Perfil</p>



<div class="informacoes">

<p>🎂 Data de nascimento</p>

<p>📝 Informações pessoais</p>

<p>🔐 Permissões</p>

</div>


</div>



<a href="familia.html" class="voltar">

← Voltar

</a>


</div>



<script>


const membros = {

    laercio:{
        nome:"Laércio",
        perfil:"Administrador 👑",
        foto:"fotos/laercio.jpg"
    },

    taina:{
        nome:"Tainá",
        perfil:"Responsável",
        foto:"fotos/taina.jpg"
    },

    anaclara:{
        nome:"Ana Clara",
        perfil:"Filha",
        foto:"fotos/anaclara.jpg"
    },

    isadora:{
        nome:"Isadora",
        perfil:"Filha",
        foto:"fotos/isadora.jpg"
    },

    isaac:{
        nome:"Isaac",
        perfil:"Filho",
        foto:"fotos/isaac.jpg"
    }

};



const url = new URLSearchParams(window.location.search);

const membroSelecionado = url.get("membro");



if(membroSelecionado && membros[membroSelecionado]){


document.getElementById("nomeMembro").innerHTML =
membros[membroSelecionado].nome;


document.getElementById("tipoMembro").innerHTML =
membros[membroSelecionado].perfil;


document.getElementById("fotoMembro").src =
membros[membroSelecionado].foto;


}



</script>


</body>

</html>
