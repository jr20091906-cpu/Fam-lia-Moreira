<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Tarefa - Família Moreira</title>

<link rel="stylesheet" href="nova-tarefa.css">

</head>

<body>

<div class="container">

<header>

<h1>➕ Nova Tarefa</h1>

<p>Cadastre uma nova tarefa para a família.</p>

</header>

<form id="formTarefa">

<label>Título</label>
<input type="text" id="titulo" required>

<label>Responsável</label>
<select id="responsavel" required>

<option value="laercio">Laércio</option>
<option value="taina">Tainá</option>
<option value="anaclara">Ana Clara</option>
<option value="isadora">Isadora</option>
<option value="isaac">Isaac</option>
<option value="todos">Toda a família</option>

</select>

<label>Data</label>
<input type="date" id="data" required>

<label>Prioridade</label>
<select id="prioridade">

<option value="Baixa">Baixa</option>
<option value="Média">Média</option>
<option value="Alta">Alta</option>

</select>

<label>Status</label>
<select id="status">

<option value="Pendente">Pendente</option>
<option value="Em andamento">Em andamento</option>
<option value="Concluída">Concluída</option>

</select>

<label>Observações</label>
<textarea
id="observacoes"
rows="4"
placeholder="Opcional"></textarea>

<button type="submit">

💾 Salvar Tarefa

</button>

</form>

<a href="tarefas.html">

← Voltar

</a>

</div>

<script src="nova-tarefa.js"></script>

</body>

</html>
