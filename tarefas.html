<!DOCTYPE html>

<p>Organize as responsabilidades de todos.</p>

</header>

<section class="acoes">

type="text"
id="pesquisa"
placeholder="Pesquisar tarefa...">

<option value="todos">Todos</option>

</select>

<button id="novaTarefa">

➕ Nova tarefa

</button>

</section>

<section id="listaTarefas">

<div class="card">

<h2>Nenhuma tarefa cadastrada</h2>

<p>As tarefas aparecerão aqui.</p>

</div>

</section>

<a href="dashboard.html" class="voltar">

← Voltar ao Dashboard

</a>

</div>
