<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Família Moreira</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(180deg,#0f172a,#1e293b);
}

.login-box{

background:#1e293b;

padding:30px;

width:350px;

border-radius:20px;

text-align:center;

box-shadow:0 0 25px rgba(0,0,0,.4);

}

.login-box img{

width:120px;

height:120px;

border-radius:50%;

border:4px solid #22c55e;

margin-bottom:20px;

}

.login-box h2{

margin-bottom:20px;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:10px;

font-size:16px;

}

button{

width:100%;

padding:14px;

background:#22c55e;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#16a34a;

}

.voltar{

margin-top:20px;

display:block;

color:white;

text-decoration:none;

}

</style>

</head>

<body>

<div class="login-box">

<img src="https://via.placeholder.com/120">

<h2>Família Moreira</h2>

<input
type="text"
placeholder="Usuário">

<input
type="password"
placeholder="Senha">

<button>

Entrar

</button>

<a class="voltar" href="index.html">

← Voltar para árvore

</a>

</div>

</body>

</html>
