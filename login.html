<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Família Moreira</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(180deg,#062e1a,#14532d);
}


.login-box{

    width:90%;
    max-width:380px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);

    padding:35px;

    border-radius:25px;

    text-align:center;

    color:white;

    box-shadow:0 0 30px rgba(0,0,0,.4);

}


.login-box h1{

    margin-bottom:10px;

}


.login-box p{

    margin-bottom:25px;

    color:#dcfce7;

}


input{

    width:100%;

    padding:14px;

    margin:10px 0;

    border:none;

    border-radius:12px;

    font-size:16px;

}


button{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:12px;

    background:#22c55e;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}


button:hover{

    background:#16a34a;

}


.voltar{

    display:block;

    margin-top:20px;

    color:white;

    text-decoration:none;

}


</style>

</head>


<body>


<div class="login-box">


<h1>❤️ Família Moreira</h1>


<p>Acesse seu perfil</p>



<input 
id="usuario"
type="text"
placeholder="Usuário">



<input 
id="senha"
type="password"
placeholder="Senha">



<button onclick="entrar()">

Entrar

</button>



<a class="voltar" href="index.html">

← Voltar

</a>


</div>



<script src="login.js"></script>


</body>

</html>
